# nginx-Konfiguration für die statische PWA "Uhr lernen"
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Kompression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 512;

    # Service Worker: immer frisch prüfen, nie hart cachen
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Einstiegsseite: nicht cachen, damit Updates sofort ankommen
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Korrekter MIME-Typ für das PWA-Manifest
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Statische Dateien ausliefern, sonst auf index.html zurückfallen
    # (die App nutzt Hash-Routing, daher reicht index.html für alle Routen)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
